[env]
lib_extra_dirs = ../..

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; Serial monitor settings
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Build flags
build_flags =
    -DCORE_DEBUG_LEVEL=3

; Library dependencies
lib_deps =
    ; VictronBLE library will be automatically included from parent directory

; Optional: Specify partition scheme if needed
; board_build.partitions = default.csv

[env:esp32-s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
#    -DCORE_DEBUG_LEVEL=3

[env:esp32-s3-debug]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
#monitor_speed = 115200
#monitor_filters = esp32_exception_decoder
upload_protocol = esp-builtin

; Debug configuration for GDB
debug_tool = esp-builtin
debug_init_break = tbreak setup
debug_speed = 5000
debug_load_mode = always

; Build flags for debugging
build_flags =
    -DCORE_DEBUG_LEVEL=5    ; Maximum ESP32 debug level
    -O0                      ; Disable optimization for debugging
    -g3                      ; Maximum debug information
build_type = debug

[env:esp32-c3]
platform = espressif32
framework = arduino
board = esp32-c3-devkitm-1
board_build.mcu = esp32c3
board_build.f_cpu = 160000000L
board_build.flash_mode = dio
board_build.partitions = default.csv
monitor_speed = 115200
monitor_filters = time, default, esp32_exception_decoder
upload_speed = 921600
# NOTE: Need these two ARDUIO_USB modes to work with serial
build_flags =
    -Os
    -I src
    -D ARDUINO_ESP32C3_DEV
    -D CONFIG_IDF_TARGET_ESP32C3
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
    elapsedMillis

[env:esp32-c3-debug]
platform = espressif32
board = esp32-c3-devkitc-02
framework = arduino
monitor_speed = 115200

; Upload configuration
upload_protocol = esp-builtin

; Debug configuration for GDB
debug_tool = esp-builtin
debug_init_break = tbreak setup
debug_speed = 5000
debug_load_mode = always

; Build flags for debugging
build_flags =
    -DCORE_DEBUG_LEVEL=5    ; Maximum ESP32 debug level
    -O0                      ; Disable optimization for debugging
    -g3                      ; Maximum debug information
build_type = debug

[env:m5stick]
platform = espressif32
board = m5stick-c
framework = arduino
board_build.mcu = esp32
board_build.f_cpu = 240000000L
board_build.partitions = no_ota.csv
#upload_protocol = espota
#upload_port = Button.local
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
#debug_tool = esp-prog ; esp-bridge, esp-prog  ; or ftdi, esp-builtin, jlink, etc.
# debug_speed = 5000     ; optional: JTAG speed in kHz
#build_flags =
#	-DCORE_DEBUG_LEVEL=5    ; ESP32 debug level
#	-O0                      ; no optimization
#	-g3                      ; max debug info
build_flags =
	-Os
lib_deps =
    M5StickC
    elapsedMillis

[env:tough]
board = m5stack-core2
board_build.mcu = esp32
platform = espressif32
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
debug_tool = esp-bridge ; esp-bridge, esp-prog  ; or ftdi, esp-builtin, jlink, etc.
# debug_speed = 5000     ; optional: JTAG speed in kHz
build_flags =
	-DCORE_DEBUG_LEVEL=5    ; ESP32 debug level
	-O0                      ; no optimization
	-g3                      ; max debug info
    -DARDUINO_M5STACK_TOUGH
    -DDISPLAY_WIDTH=320
    -DDISPLAY_HEIGHT=240
    -DHAS_TOUCH=1
    -DBUFFER_LINES=10
lib_deps =
    M5Unified
    elapsedMillis
