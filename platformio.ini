; ============================================================
; PlatformIO Konfiguration
; Board: Sunton ESP32-S3 4.3" 800x480 IPS RGB LCD
;
; WICHTIG laut README:
; Die Board-Definitionen müssen im Unterordner "boards/" liegen.
; Einmalig im Projektverzeichnis ausführen:
;   git submodule add https://github.com/rzeldent/platformio-espressif32-sunton.git boards
;
; Varianten des 4.3" 800x480 Boards:
;   esp32-8048S043C  = kapazitiver Touch (GT911)  ← wahrscheinlich dein Board
;   esp32-8048S043R  = resistiver Touch (XPT2046)
;   esp32-8048S043N  = kein Touch
;
; Eine Zeile auskommentieren, die anderen drei aktiv lassen:
; ============================================================

[platformio]
default_envs = esp32-8048S043C
boards_dir = boards       

; ============================================================
; Gemeinsame Einstellungen für alle Varianten
; ============================================================
[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0
build_flags =
    -Ofast
    -D CORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_INFO
    -D LV_CONF_INCLUDE_SIMPLE
    -I $PROJECT_INCLUDE_DIR

lib_deps =
    https://github.com/rzeldent/esp32-smartdisplay.git
    



; ============================================================
; Board-Environments  (Board-JSON kommt aus boards/ Submodul)
; ============================================================
[env:esp32-8048S043C]
board = esp32-8048S043C

[env:esp32-8048S043R]
board = esp32-8048S043R

[env:esp32-8048S043N]
board = esp32-8048S043N
